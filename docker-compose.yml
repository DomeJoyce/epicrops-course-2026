# =============================================================================
# docker-compose.yml – "The Epi-Code" Practical Course
# Florence Training School, 14–17 July 2026
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DAY 1 – lncRNA / mRNA differential expression
  # Self-contained image: all tools + the 6 Chr4 RNA-seq libraries + reference
  # are already inside it (nothing to download). JupyterLab on :8888.
  # Usage: docker compose up day1          -> open http://localhost:8888
  #        docker compose run --rm day1 bash   (pure command line)
  # Walkthrough: exercises/Day1_lncRNA_mRNA_Pipeline.md
  # ---------------------------------------------------------------------------
  day1:
    image: leogiuffre/lncrna-mnps-workshop:1.0
    container_name: epi_code_day1
    hostname: epi-code-day1
    stdin_open: true
    tty: true
    ports:
      - "8888:8888"
    # Trimmomatic (old Java) crashes under the image's OpenJDK 22 C2 JIT compiler
    # (SIGSEGV in FastqParser.next once the method gets hot). Disabling the C2
    # tier fixes it with no measurable slowdown on this data.
    #
    # SHELL=/bin/bash: the Jupyter server process has no $SHELL set by default,
    # so JupyterLab's terminal (terminado) falls back to /bin/sh (dash) — no
    # arrow-key history, no Tab completion, no `history` builtin. Setting SHELL
    # makes every new terminal tab spawn a real bash shell instead.
    environment:
      - JAVA_TOOL_OPTIONS=-XX:TieredStopAtLevel=1
      - SHELL=/bin/bash
    # Persist Day 1 results on the host (works out of the box on Docker Desktop).
    volumes:
      - ./results/day1_lncRNA:/home/student/results
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: "6G"

  # ---------------------------------------------------------------------------
  # Main course environment (interactive terminal) — Day 2 (WGBS / methylation)
  # Usage: docker compose run --rm course
  # ---------------------------------------------------------------------------
  course:
    image: epi-code-practical:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epi_code_course
    hostname: epi-code
    stdin_open: true
    tty: true

    # Mount local working directory into container so data + results persist
    volumes:
      - ./data:/course/data                   # raw FASTQ + reference indices (persist)
      - ./results:/course/results             # analysis results (persist)
      - ./scripts:/course/scripts             # scripts (editable live)
      - ./exercises:/course/exercises         # exercise files

    # Resource limits – tuned for laptops (8 GB RAM, 4 cores)
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: "6G"
        reservations:
          memory: "2G"

    environment:
      - COURSE_DIR=/course
      - DATA_DIR=/course/data
      - REF_DIR=/course/data/reference
      - RESULTS_DIR=/course/results
      - SCRIPTS_DIR=/course/scripts

    command: /bin/bash

  # ---------------------------------------------------------------------------
  # DAY 2 – WGBS / methylation, JupyterLab (same experience as Day 1)
  # JupyterLab on :8889 (Day 1 uses :8888, so both days can run at the same time),
  # no token: open http://localhost:8889 directly, then File -> New -> Terminal and
  # run the Day 2 commands by hand.
  # Usage: docker compose up day2
  # Walkthrough: exercises/Day2_DNA_Methylation_Analysis.md
  # (For a plain terminal instead, use the 'course' service above.)
  # NOTE: the host port (8889) is only the browser URL; it has NOTHING to do with
  # how the two days share data — that happens through the ./results host folder
  # this service bind-mounts below.
  # ---------------------------------------------------------------------------
  day2:
    image: epi-code-practical:latest
    container_name: epi_code_day2
    hostname: epi-code-day2
    stdin_open: true
    tty: true
    ports:
      - "8889:8888"

    volumes:
      - ./data:/course/data
      - ./results:/course/results
      - ./scripts:/course/scripts
      - ./exercises:/course/exercises
      - ./notebooks:/course/notebooks

    deploy:
      resources:
        limits:
          cpus: "3"
          memory: "6G"

    environment:
      - COURSE_DIR=/course
      - DATA_DIR=/course/data
      - REF_DIR=/course/data/reference
      - RESULTS_DIR=/course/results
      # Without this, the Jupyter server has no $SHELL set, so its Terminal
      # falls back to /bin/sh (dash): no arrow-key history, no Tab completion.
      - SHELL=/bin/bash

    # JupyterLab with the same flags Day 1's image uses (empty token/password ->
    # plain http://localhost:8888 URL, identical to Day 1).
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --ServerApp.root_dir=/course
        --ServerApp.token=
        --ServerApp.password=
